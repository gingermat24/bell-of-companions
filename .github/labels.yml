# --- Status ---

- name: duplicate
  color: "cfd3d7"
  description: Already reported - see the linked issue

- name: wontfix
  color: "ffffff"
  description: Will not be fixed or implemented

- name: documentation
  color: "0052cc"
  description: The mod page or documentation needs to be updated or improved

- name: invalid
  color: "e4e669"
  description: Not a valid bug - may be wrong usage, outdated game version, or user error
