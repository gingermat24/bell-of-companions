# Labels for Bell of Companions issue tracker
# Synced automatically via the sync-labels workflow.

# --- Type ---

- name: bug
  color: "d73a4a"
  description: Something isn't working as expected

- name: crash
  color: "b60205"
  description: The game crashes when loading or using the mod

- name: enhancement
  color: "a2eeef"
  description: A request for a new feature or an improvement to existing behavior

- name: compatibility
  color: "e4e669"
  description: Causes issues or conflicts when used alongside another mod

- name: question
  color: "d876e3"
  description: A question about how to use the mod - not a bug report

# --- Priority ---

- name: high-priority
  color: "e11d48"
  description: Should be fixed as soon as possible

- name: low-priority
  color: "fef9c3"
  description: Low impact - can be addressed later

